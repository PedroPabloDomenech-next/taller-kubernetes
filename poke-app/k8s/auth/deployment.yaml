apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: poke-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: poke-auth:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: AUTH_DB_URL
              valueFrom:
                secretKeyRef:
                  name: poke-secrets
                  key: auth-db-url
            - name: JWT_ISSUER
              value: PokeAuth
            - name: JWT_AUDIENCE
              value: PokeApp
            - name: JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: poke-secrets
                  key: jwt-key
            - name: JWT_EXPIRATION_HOURS
              value: "8"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
