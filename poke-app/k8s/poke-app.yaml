apiVersion: v1
kind: Namespace
metadata:
  name: poke-app
---
apiVersion: v1
kind: Secret
metadata:
  name: poke-secrets
  namespace: poke-app
type: Opaque
stringData:
  postgres-password: poke
  jwt-key: super-secret-development-key-change-me
  auth-db-connection-string: Host=auth-db;Port=5432;Database=poke_auth;Username=poke;Password=poke
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: auth-db-data
  namespace: poke-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-db
  namespace: poke-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-db
  template:
    metadata:
      labels:
        app: auth-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: poke_auth
            - name: POSTGRES_USER
              value: poke
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: poke-secrets
                  key: postgres-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U poke -d poke_auth"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U poke -d poke_auth"]
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: auth-db-data
---
apiVersion: v1
kind: Service
metadata:
  name: auth-db
  namespace: poke-app
spec:
  selector:
    app: auth-db
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: poke-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: poke-auth:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ConnectionStrings__AuthDb
              valueFrom:
                secretKeyRef:
                  name: poke-secrets
                  key: auth-db-connection-string
            - name: Jwt__Issuer
              value: PokeAuth
            - name: Jwt__Audience
              value: PokeApp
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: poke-secrets
                  key: jwt-key
            - name: Jwt__ExpirationHours
              value: "8"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: poke-app
spec:
  selector:
    app: auth
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: back
  namespace: poke-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: back
  template:
    metadata:
      labels:
        app: back
    spec:
      containers:
        - name: back
          image: poke-back:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: Auth__BaseUrl
              value: http://auth:8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: back
  namespace: poke-app
spec:
  selector:
    app: back
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: front
  namespace: poke-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: front
  template:
    metadata:
      labels:
        app: front
    spec:
      containers:
        - name: front
          image: poke-front:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: front
  namespace: poke-app
spec:
  selector:
    app: front
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: poke-app
  namespace: poke-app
spec:
  ingressClassName: nginx
  rules:
    - host: poke.local
      http:
        paths:
          - path: /api/v2
            pathType: Prefix
            backend:
              service:
                name: back
                port:
                  number: 8080
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: front
                port:
                  number: 80
