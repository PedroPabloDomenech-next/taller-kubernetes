server:
  port: 8080

spring:
  application:
    name: poke-auth
  jackson:
    default-property-inclusion: non_null

auth:
  db:
    connection-string: ${AUTH_DB_URL:jdbc:postgresql://localhost:55432/poke_auth?user=poke&password=poke}
  jwt:
    issuer: ${JWT_ISSUER:PokeAuth}
    audience: ${JWT_AUDIENCE:PokeApp}
    key: ${JWT_KEY:super-secret-development-key-change-me}
    expiration-hours: ${JWT_EXPIRATION_HOURS:8}

logging:
  level:
    root: INFO
    org.springframework.web: INFO
